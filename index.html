<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Einverständniserklärung</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
margin:0;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:green;
margin-bottom:30px;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

canvas{
border:2px solid #ccc;
border-radius:10px;
width:100%;
height:200px;
background:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.send{
background:green;
color:white;
}

.clear{
background:red;
color:white;
}

p{
line-height:1.7;
font-size:16px;
color:#333;
}

h3{
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>Einverständniserklärung</h1>

  <input
id="vorname"
placeholder="Vorname *"
autocomplete="given-name"
required
>

<input id="nachname" placeholder="Nachname *" autocomplete="family-name" required>

<input id="strasse" placeholder="Straße *" autocomplete="street-address" required>

<input id="hausnummer" placeholder="Hausnummer *" autocomplete="address-line2" required>

<input id="plz" placeholder="PLZ *" autocomplete="postal-code" required>

<input id="stadt" placeholder="Stadt *" autocomplete="address-level2" required>
  <input
<input
id="geburtsdatum"
type="text"
placeholder="Geburtsdatum TT.MM.JJJJ *"
maxlength="10"
required
oninput="formatGeburtsdatum(this)"
>

<input id="email" type="email" placeholder="E-Mail-Adresse *" autocomplete="email" required>

<p>

Hiermit berechtige ich Ibrahim Doenmez,
in meinem Namen Energie- und Versicherungsangebote einzuholen,
Tarifvergleiche durchzuführen und abzuschließen sowie mit
Energieversorgern und Versicherungen zu kommunizieren.

<label style="
display:flex;
align-items:flex-start;
gap:10px;
margin-top:20px;
font-size:14px;
line-height:1.6;
">

<input
type="checkbox"
id="datenschutz"
required
style="
margin-top:4px;
width:auto;
">

<span>

Ich stimme der Verarbeitung meiner personenbezogenen Daten
gemäß der Datenschutzerklärung zu und erkläre mich
mit der Kontaktaufnahme durch Ibrahim Dönmez einverstanden.

</span>

</label>


<canvas id="signature-pad"></canvas>

<button class="clear" onclick="clearSignature()">
Unterschrift löschen
</button>

<button class="send" onclick="sendForm()">
Jetzt unterschreiben & senden
</button>

</div>

<script>

const canvas = document.getElementById("signature-pad");

canvas.width = canvas.offsetWidth;

canvas.height = 200;

const signaturePad = new SignaturePad(canvas);

function clearSignature(){

signaturePad.clear();

}
function formatGeburtsdatum(input){

let value = input.value.replace(/\D/g, '');

if(value.length > 2 && value.length <= 4){
value = value.slice(0,2) + '.' + value.slice(2);
}

else if(value.length > 4){
value = value.slice(0,2) + '.' + value.slice(2,4) + '.' + value.slice(4,8);
}

input.value = value;

}
async function sendForm(){
if(
!document.getElementById("vorname").value ||
!document.getElementById("nachname").value ||
!document.getElementById("strasse").value ||
!document.getElementById("hausnummer").value ||
!document.getElementById("plz").value ||
!document.getElementById("stadt").value ||
!document.getElementById("geburtsdatum").value ||
!document.getElementById("email").value
){
alert("Bitte alle Pflichtfelder ausfüllen");
return;
}

if(!document.getElementById("datenschutz").checked){
alert("Bitte Datenschutz bestätigen");
return;
}
if(signaturePad.isEmpty()){

alert("Bitte unterschreiben");

return;

}

const data = {

vorname: document.getElementById("vorname").value,

nachname: document.getElementById("nachname").value,

strasse: document.getElementById("strasse").value,
  
hausnummer: document.getElementById("hausnummer").value,

plz: document.getElementById("plz").value,

stadt: document.getElementById("stadt").value,

geburtsdatum: document.getElementById("geburtsdatum").value,

email: document.getElementById("email").value,

unterschrift: signaturePad.toDataURL()

};

try{

const response = await fetch("/api/send",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

const result = await response.json();

if(result.success){

alert("Erfolgreich versendet");

location.reload();

}else{

alert(result.error || "Fehler beim Versand");

}

}catch(error){

console.log(error);

alert("Serverfehler");

}

}

</script>

</body>

</html>
